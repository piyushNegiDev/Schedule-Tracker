<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Schedule Tracker</h1>
    </header>

    <div class="events">
      <table>
        <thead>
          <tr id="dateRow">
            <th>Date</th>
            <!--  -->
          </tr>
        </thead>
        <tbody>
          <tr id="eventRow">
            <!--  -->
          </tr>
        </tbody>
      </table>
      <input type="month" id="calendar" />
    </div>

    <div class="addBtnDiv"><button>+ Add Event</button></div>

    <div class="progressGraph"></div>

    <script src="script.js"></script>
  </body>
</html>
